<!-- categories_list.html -->
{% extends 'admin_index.html' %}

{% block content %}
<div class="main-content">
    <h1>Categories List</h1>
    <div id="confirmationModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <p>Are you sure you want to delete this category?</p>
            <button id="confirmDelete" class="button delete-button">Yes, Delete</button>
            <button class="button" onclick="closeModal()">Cancel</button>
        </div>
    </div>
    <table>
        <thead>
            <tr>
                <th>Category Name</th>
                <th>Category Image</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.name }}</td>
                <td><img src="{{ category.image.url }}" alt="{{ category.name }}" style="width: 100px; height: auto;">
                </td>

                <td>
                    <a href="{% url 'edit_category' category.id %}" class="button edit-button">Edit</a>

                    <button class="button delete-button" onclick="openModal('{{ category.id }}')">Delete</button>

                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Confirmation Modal -->

<style>
    /* General button styles */
    .button {
        display: inline-block;
        padding: 10px 20px;
        background-color: #007bff;
        /* Change this to your preferred button color */
        color: white;
        text-decoration: none;
        border-radius: 4px;
        font-size: 16px;
        text-align: center;
        transition: background-color 0.3s ease;
    }

    /* Hover effect */
    .button:hover {
        background-color: #0056b3;
        /* Change this for hover effect */
    }

    /* Optional: edit button specific styles */
    .edit-button {
        background-color: #28a745;
        /* Edit button color */
    }

    .edit-button:hover {
        background-color: #218838;
        /* Edit button hover effect */
    }

    /* Delete button specific styles */
    .delete-button {
        background-color: #dc3545;
        /* Red background for delete button */
    }

    .delete-button:hover {
        background-color: #c82333;
        /* Darker red when hovered */
    }
</style>

<script>
    let categoryIdToDelete;

    function openModal(categoryId) {
        categoryIdToDelete = categoryId;
        document.getElementById('confirmationModal').style.display = "block";
    }

    function closeModal() {
        document.getElementById('confirmationModal').style.display = "none";
    }

    document.getElementById('confirmDelete').onclick = function () {
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = `/categories/delete/${categoryIdToDelete}/`;
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'csrfmiddlewaretoken';
        hiddenInput.value = csrfToken;
        form.appendChild(hiddenInput);
        document.body.appendChild(form);
        form.submit();
    };

    function toggleDropdown(event) {
        event.preventDefault();
        const dropdown = event.target.parentElement;
        dropdown.classList.toggle("active");
    }
</script>
{% endblock %}
